<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strike-Craft Lures</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent: #6fa8dc;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border: #333333;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h2, h3 {
            color: var(--accent);
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #2d2d2d;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.9;
        }
        .result-box {
            margin-top: 15px;
            padding: 10px;
            background: #252525;
            border-left: 4px solid var(--accent);
            display: none;
        }
        .blueprint-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .blueprint-card {
            background: #252525;
            border: 1px solid var(--border);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border-radius: 4px;
        }
        .blueprint-card:hover {
            border-color: var(--accent);
        }
        .forum-thread {
            border: 1px solid var(--border);
            background: #1a1a1a;
            margin-bottom: 10px;
            border-radius: 4px;
            overflow: hidden;
        }
        .thread-header {
            padding: 15px;
            background: #252525;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .thread-content {
            padding: 15px;
            display: none;
            border-top: 1px solid var(--border);
        }
        .forum-post {
            background: #222;
            padding: 10px;
            border-radius: 4px;
        }
        .post-author {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 24px; cursor: pointer; color: var(--text-muted);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 30px;">
        <h1>STRIKE-CRAFT HQ</h1>
        <p style="color: var(--text-muted);">Custom Lure Engineering & Community Forum</p>
    </header>

    <div class="section">
        <h2>Lure Selector Matrix</h2>
        <div class="form-group">
            <label for="target">Target Species</label>
            <select id="target">
                <option value="pike">Northern Pike</option>
                <option value="perch">Big Perch / Bass</option>
            </select>
        </div>
        <div class="form-group">
            <label for="weather">Weather / Water Clarity</label>
            <select id="weather">
                <option value="sunny">Sunny / Clear Water</option>
                <option value="overcast">Overcast / Stained Water</option>
            </select>
        </div>
        <button onclick="findLure()">Generate Recommendation</button>
        <div id="resultBox" class="result-box"></div>
    </div>

    <div class="section">
        <h2>Technical Blueprints</h2>
        <div class="blueprint-grid">
            <div class="blueprint-card" onclick="openBlueprint('perch')">Huron Perch (130mm)</div>
            <div class="blueprint-card" onclick="openBlueprint('shad')">Zombie Shad (110mm)</div>
            <div class="blueprint-card" onclick="openBlueprint('crank')">Deep Reactor (75mm)</div>
        </div>
    </div>

    <div class="section">
        <h2>Ballast Calculator</h2>
        <div class="form-group">
            <label for="woodType">Wood Material Type</label>
            <select id="woodType">
                <option value="balsa">Balsa (Ultra Buoyant)</option>
                <option value="cedar">Red Cedar (Medium Density)</option>
                <option value="pine">White Pine (Heavy Density)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="blankWeight">Raw Wood Blank Weight (grams)</label>
            <input type="number" id="blankWeight" placeholder="e.g. 25">
        </div>
        <button onclick="calculateBallast()">Calculate Target Ballast</button>
        <div id="ballastResult" class="result-box"></div>
    </div>

    <div class="section">
        <h2>Community Dev Forum</h2>
        <div id="forumContainer" style="margin-bottom: 20px;"></div>

        <h3>Create New Thread</h3>
        <div class="form-group">
            <label for="forumUser">Handle / Callisgn</label>
            <input type="text" id="forumUser" placeholder="LureBuilderX">
        </div>
        <div class="form-group">
            <label for="forumTopic">Topic Title</label>
            <input type="text" id="forumTopic" placeholder="Belly weight position error...">
        </div>
        <div class="form-group">
            <label for="forumText">Message Body</label>
            <textarea id="forumText" rows="4" placeholder="Type technical specs or feedback here..."></textarea>
        </div>
        <button onclick="createPost()">Submit Technical Thread</button>
    </div>
</div>

<div id="blueprintModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeBlueprint()">&times;</span>
        <h3 id="modalTitle">Blueprint Spec</h3>
        <div id="modalCanvas" style="background: #151515; padding: 10px; margin-bottom: 15px; text-align: center;"></div>
        <div id="modalSpecs" style="color: var(--text-muted); font-size: 14px; line-height: 1.5;"></div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://fkauskwrxajzzchciaiu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrYXVza3dyeGFqenpjaGNpYWl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTU4ODQsImV4cCI6MjA5ODY3MTg4NH0.HtV0K2r9hR16FRQWVqwS5w2NLFE_ONGq3Fqxbv0UdjI';

let supabaseClient;
try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch(e) {
    console.error("Supabase failed to initialize:", e);
}

function findLure() {
    const target = document.getElementById('target').value;
    const weather = document.getElementById('weather').value;
    const resultBox = document.getElementById('resultBox');
    let recommendation = target === 'pike' ? (weather === 'sunny' ? "🎯 Strike-Craft Shad (Silver Flash)" : "🎯 Strike-Craft Shad (Firetiger)") : "🎯 Ghost Minnow Deep Diver";
    resultBox.innerText = recommendation;
    resultBox.style.display = 'block';
}

const blueprintsData = {
    perch: {
        title: "TECHNICAL SPEC: THE 'HURON PERCH' (130mm GLIDEBAIT)",
        svg: '<svg width="260" height="100" viewBox="0 0 260 100"><path d="M10,50 Q70,10 140,30 T250,50 Q180,85 110,80 T10,50 Z" fill="none" stroke="#6fa8dc" stroke-width="2" stroke-dasharray="4"/><circle cx="100" cy="65" r="8" fill="#f1c232" stroke="#fff" /><text x="92" y="45" fill="#fff" font-size="10">Ballast A</text><circle cx="170" cy="60" r="6" fill="#f1c232" stroke="#fff" /><text x="160" y="45" fill="#fff" font-size="10">Ballast B</text><circle cx="20" cy="50" r="3" fill="none" stroke="#6fa8dc" stroke-width="2"/><circle cx="120" cy="78" r="3" fill="none" stroke="#6fa8dc" stroke-width="2"/></svg>',
        specs: "<strong>Length:</strong> 130mm | <strong>Material:</strong> Red Cedar target profile.<br><strong>Ballast Layout:</strong> Split setup. Insert 60% lead in Front Ventral slot (Ballast A) and 40% in Mid-Rear cavity (Ballast B). Provides the signature slow S-curve swimming dynamic."
    },
    shad: {
        title: "TECHNICAL SPEC: 'ZOMBIE SHAD' (110mm SUSPENDING MINNOW)",
        svg: '<svg width="240" height="100" viewBox="0 0 240 100"><path d="M10,45 Q60,15 130,25 T230,45 Q160,75 100,70 T10,45 Z" fill="none" stroke="#6fa8dc" stroke-width="2" stroke-dasharray="4"/><circle cx="85" cy="55" r="10" fill="#f1c232" stroke="#fff" /><text x="65" y="35" fill="#fff" font-size="10">Center Ballast</text><circle cx="15" cy="45" r="3" fill="none" stroke="#6fa8dc" stroke-width="2"/><path d="M22,55 L35,75" stroke="#6fa8dc" stroke-width="3" fill="none" /><text x="38" y="80" fill="#6fa8dc" font-size="10">Lip Edge</text></svg>',
        specs: "<strong>Length:</strong> 110mm | <strong>Material:</strong> Balsa Wood for high reaction float.<br><strong>Ballast Layout:</strong> Centered heavy ballast directly surrounding the belly hook hanger. Calibrated to offset balsa buoyancy for dead-stop water suspension."
    },
    crank: {
        title: "TECHNICAL SPEC: 'DEEP REACTOR' (SQUAREBILL CRANKBAIT)",
        svg: '<svg width="200" height="100" viewBox="0 0 200 100"><path d="M15,50 Q50,10 110,25 T190,50 Q130,90 80,85 T15,50 Z" fill="none" stroke="#6fa8dc" stroke-width="2" stroke-dasharray="4"/><circle cx="70" cy="65" r="12" fill="#f1c232" stroke="#fff" /><text x="50" y="40" fill="#fff" font-size="10">Low Ballast</text><path d="M25,60 L5,90" stroke="#fff" stroke-width="4" fill="none" /><text x="8" y="98" fill="#fff" font-size="10">Square Lip</text></svg>',
        specs: "<strong>Length:</strong> 75mm (Fat profile) | <strong>Material:</strong> White Pine / Cedar.<br><strong>Ballast Layout:</strong> Single ultra-low focal point ballast to ensure high roll stability and immediate deflection memory when impacting underwater rock structures."
    }
};

function openBlueprint(type) {
    const data = blueprintsData[type];
    if(data) {
        document.getElementById('modalTitle').innerText = data.title;
        document.getElementById('modalCanvas').innerHTML = data.svg;
        document.getElementById('modalSpecs').innerHTML = data.specs;
        document.getElementById('blueprintModal').style.display = 'flex';
    }
}

function closeBlueprint() {
    document.getElementById('blueprintModal').style.display = 'none';
}

function toggleThread(id) {
    const content = document.getElementById(id);
    if(content.style.display === 'block') {
        content.style.display = 'none';
    } else {
        content.style.display = 'block';
    }
}

function calculateBallast() {
    const wood = document.getElementById('woodType').value;
    const weight = parseFloat(document.getElementById('blankWeight').value) || 0;
    let factor = 0.5;
    if (wood === 'balsa') factor = 1.2;
    if (wood === 'cedar') factor = 0.7;
    
    const result = Math.round(weight * factor);
    const resultBox = document.getElementById('ballastResult');
    resultBox.innerHTML = `⚖️ Estimated Required Lead Ballast: ~<strong>${result}g</strong> for optimal balancing.`;
    resultBox.style.display = 'block';
}

function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
}

async function loadPosts() {
    if (!supabaseClient) return;
    const container = document.getElementById('forumContainer');
    
    const staticThreadHTML = `
        <div class="forum-thread">
            <div class="thread-header" onclick="toggleThread('thread1')">
                <div class="thread-info">
                    <h3>Best lead weight distribution for stable 110mm glidebaits?</h3>
                    <span class="thread-meta">Started by LureCrafter99 • Archive Thread</span>
                </div>
                <span class="thread-replies">Static</span>
            </div>
            <div id="thread1" class="thread-content">
                <div class="forum-post">
                    <div class="post-author">LureCrafter99 (Topic Starter):</div>
                    <div class="post-text">Hey guys, I'm carving a 110mm wooden glidebait but it keeps rolling on faster retrieves. Where should I center the belly weights?</div>
                </div>
            </div>
        </div>
    `;

    try {
        const { data: posts, error } = await supabaseClient
            .from('forum_posts')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) throw error;

        let dynamicThreadsHTML = '';
        if (posts && posts.length > 0) {
            posts.forEach((post, index) => {
                const safeUser = escapeHTML(post.username || 'Anonymous');
                const safeTitle = escapeHTML(post.title || 'No Title');
                const safeText = escapeHTML(post.message || '');
                const threadId = `dynamic_thread_${post.id || index}`;
                const dateStr = post.created_at ? new Date(post.created_at).toLocaleDateString() : 'Recent';

                dynamicThreadsHTML += `
                    <div class="forum-thread">
                        <div class="thread-header" onclick="toggleThread('${threadId}')">
                            <div class="thread-info">
                                <h3>${safeTitle}</h3>
                                <span class="thread-meta">Started by ${safeUser} • ${dateStr}</span>
                            </div>
                            <span class="thread-replies">Live</span>
                        </div>
                        <div id="${threadId}" class="thread-content">
                            <div class="forum-post">
                                <div class="post-author">${safeUser}:</div>
                                <div class="post-text">${safeText}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        container.innerHTML = staticThreadHTML + dynamicThreadsHTML;

    } catch (err) {
        console.error("Error loading posts:", err);
    }
}

async function createPost() {
    if (!supabaseClient) {
        alert("Supabase client is not initialized.");
        return;
    }

    const usernameField = document.getElementById('forumUser');
    const titleField = document.getElementById('forumTopic');
    const contentField = document.getElementById('forumText');

    const username = usernameField.value.trim();
    const title = titleField.value.trim();
    const message = contentField.value.trim();

    if (!username || !title || !message) {
        alert("Please fill in all fields before posting.");
        return;
    }

    try {
        const { error } = await supabaseClient
            .from('forum_posts')
            .insert([{ username, title, message }]);

        if (error) throw error;

        usernameField.value = '';
        titleField.value = '';
        contentField.value = '';

        await loadPosts();
        alert("Discussion posted successfully!");

    } catch (err) {
        console.error("Error creating post:", err);
        alert("Failed to save post: " + err.message);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadPosts();
});
</script>

</body>
</html>
